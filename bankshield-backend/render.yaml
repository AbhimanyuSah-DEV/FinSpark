# Deployment configuration for Render
services:
  - type: web
    name: bankshield-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FRAUD_MODEL_URL
        value: mock
      - key: GEMINI_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
